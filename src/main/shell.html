<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Local chrome: no scripts/styles from anywhere but inline; remote images
       are only the services' favicons. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src https: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>KausApp</title>
  <style>
    :root {
      --bar-h: 48px;
      --top-h: 48px;
      --bg: #0a0a0c;
      --bar-bg: #000;
      --surface: #141417;
      --border: rgba(255, 255, 255, 0.08);
      --icon-idle: rgba(255, 255, 255, 0.62);
      --hover: rgba(255, 255, 255, 0.10);
      --accent: #1456ff;
      --accent-soft: rgba(20, 86, 255, 0.16);
      --badge: #ff3b30;
      --text: #e8eefc;
      --muted: rgba(255, 255, 255, 0.72);
      /* Radius system: small / medium / large + pill. */
      --r-sm: 8px;
      --r-md: 10px;
      --r-lg: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
    html, body { height: 100%; background: var(--bg); overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--text); }

    /* Pure-black custom title bar. The native title bar is hidden; the OS window
       controls (mac traffic lights / Win+Linux overlay) float within this strip.
       The whole strip is draggable so the window can be moved by it. */
    .titlebar {
      position: fixed; left: 0; right: 0; top: 0; height: var(--top-h);
      display: flex; align-items: center; justify-content: center;
      background: #000; border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }
    .titlebar .title {
      font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.01em;
      pointer-events: none; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* The service web views cover everything between the bars; only the bars show. */
    .bar {
      position: fixed; left: 0; right: 0; bottom: 0; height: var(--bar-h);
      display: flex; align-items: center; gap: 8px;
      padding: 0 8px;
      background: var(--bar-bg);
      border-top: 1px solid var(--border);
      -webkit-app-region: drag; /* let users drag the window by the empty bar */
    }
    /* Services: each one is its own rectangle tab (no group container). */
    .services {
      display: flex; align-items: center; gap: 6px;
      -webkit-app-region: no-drag;
      min-width: 0; flex-shrink: 1; overflow-x: auto; scrollbar-width: none;
    }
    .services::-webkit-scrollbar { display: none; }
    .spacer { flex: 1 1 auto; }
    .actions { display: flex; align-items: center; gap: 4px; -webkit-app-region: no-drag; }

    .btn {
      position: relative;
      width: 44px; height: 44px; border-radius: var(--r-lg); border: none;
      background: transparent; cursor: pointer; color: var(--icon-idle);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.13s ease, color 0.13s ease, transform 0.1s ease;
    }
    .btn:hover { background: var(--hover); color: #fff; }
    .btn:active { transform: scale(0.94); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Each service tab is its own rectangle: lifted fill + border, a bit wide. */
    .services .btn {
      width: 54px; height: 38px; border-radius: var(--r-sm);
      background: #141417; border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .services .btn:hover { background: #1c1c20; }

    /* Active service tab: accent-tinted fill + accent border. */
    .services .btn.active {
      background: var(--accent-soft); color: #fff;
      border-color: rgba(20, 86, 255, 0.55);
    }
    .services .btn { cursor: grab; }
    /* While being dragged to reorder. */
    .services .btn.dragging {
      opacity: 0.6; cursor: grabbing; transform: scale(1.05);
      border-color: var(--accent); z-index: 2;
    }

    .ico { width: 24px; height: 24px; border-radius: var(--r-sm); object-fit: cover; pointer-events: none; }
    /* Fallback monogram chip when a favicon hasn't loaded yet. */
    .chip {
      width: 24px; height: 24px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; pointer-events: none;
    }

    /* Unread badge. */
    .badge {
      position: absolute; top: 5px; right: 5px; min-width: 16px; height: 16px; padding: 0 4px;
      border-radius: 999px; background: var(--badge); color: #fff; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; line-height: 1;
      pointer-events: none;
    }

    .sep { width: 1px; height: 26px; background: var(--border); margin: 0 4px; -webkit-app-region: no-drag; }

    /* App wordmark on the right of the bottom bar, before the + button. */
    .brand { display: flex; align-items: center; gap: 8px; padding: 0 4px 0 8px; -webkit-app-region: no-drag; }
    .brand .logo { width: 22px; height: 22px; border-radius: var(--r-sm); object-fit: contain; }
    .brand .logo.hidden { display: none; }
    .brand .name { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; white-space: nowrap; }
    .brand .ver { font-weight: 600; color: var(--muted); font-size: 12px; }

    .glyph { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* Tooltip. */
    .btn[data-tip]:hover::before {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: var(--surface); color: #fff; font-size: 12px; font-weight: 500; white-space: nowrap;
      padding: 6px 10px; border-radius: var(--r-sm); box-shadow: 0 6px 18px rgba(0,0,0,0.5); pointer-events: none;
    }

    /* Error overlay — shown when the active service's main frame failed to load.
       The failed web view is sized 0×0 by the main process, so this shows through. */
    #overlay {
      position: fixed; left: 0; right: 0; top: var(--top-h); bottom: var(--bar-h);
      display: none; align-items: center; justify-content: center; padding: 24px;
      background: var(--bg); text-align: center;
    }
    #overlay.show { display: flex; }
    .err { max-width: 360px; }
    .err .dot { width: 44px; height: 44px; margin: 0 auto 16px; border-radius: 999px;
      background: var(--accent-soft); display: flex; align-items: center; justify-content: center; }
    .err .dot svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; }
    .err h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .err p { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
    .retry {
      font-family: inherit; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer;
      background: var(--accent); border: none; border-radius: var(--r-md); padding: 10px 20px;
    }
    .retry:hover { background: #2f6bff; }
    .retry:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="titlebar"><span class="title" id="title">KausApp</span></div>

  <div id="overlay" role="alert">
    <div class="err">
      <div class="dot"><svg viewBox="0 0 24 24"><path d="M12 8v5M12 16.5v.01"/><circle cx="12" cy="12" r="9"/></svg></div>
      <h2 id="err-title">Couldn’t load this service</h2>
      <p id="err-detail">Check your connection and try again.</p>
      <button class="retry" id="retry">Retry</button>
    </div>
  </div>

  <nav class="bar">
    <div class="services" id="services" role="tablist" aria-label="Services"></div>
    <div class="spacer"></div>
    <div class="actions">
      <div class="brand"><img class="logo hidden" id="brand-logo" alt=""><span class="name">KausApp <span class="ver" id="brand-ver"></span></span></div>
      <div class="sep"></div>
      <button class="btn" id="add" data-tip="Add a service" aria-label="Add a service">
        <svg class="glyph" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <div class="sep"></div>
      <button class="btn" id="settings" data-tip="Settings" aria-label="Settings">
        <svg class="glyph" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6h.09A1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </nav>

  <script>
    var servicesEl = document.getElementById('services');
    var overlay = document.getElementById('overlay');
    var errTitle = document.getElementById('err-title');
    var errDetail = document.getElementById('err-detail');
    var titleEl = document.getElementById('title');

    var drag = null;            // active drag-reorder state
    var suppressClick = false;  // ignore the click that ends a drag
    var pendingState = null;    // state push deferred while dragging
    var focusAfterRender = null; // data-id of a tab to re-focus after the next render
    var prevFailed = false;     // was the active service failed on the previous render?

    function initial(name) { return (name || '?').trim().charAt(0).toUpperCase(); }

    function makeChip(svc) {
      var chip = document.createElement('span');
      chip.className = 'chip';
      chip.style.background = svc.color || '#3b82f6';
      chip.textContent = initial(svc.name);
      return chip;
    }

    function render(state) {
      if (drag) { pendingState = state; return; } // don't rebuild mid-drag
      titleEl.textContent = (state && state.activeName) || 'KausApp';
      var list = (state && state.services) || [];
      servicesEl.innerHTML = '';
      list.forEach(function (svc) {
        var btn = document.createElement('button');
        btn.className = 'btn' + (svc.active ? ' active' : '');
        btn.dataset.id = svc.id;
        btn.setAttribute('data-tip', svc.name);
        btn.setAttribute('aria-label', svc.name);
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', svc.active ? 'true' : 'false');
        btn.setAttribute('aria-keyshortcuts', 'Alt+ArrowLeft Alt+ArrowRight');
        if (svc.active) btn.setAttribute('aria-current', 'page');

        if (svc.favicon) {
          var img = document.createElement('img');
          img.className = 'ico';
          img.src = svc.favicon;
          img.alt = '';
          img.onerror = function () { btn.replaceChild(makeChip(svc), img); };
          btn.appendChild(img);
        } else {
          btn.appendChild(makeChip(svc));
        }

        if (svc.unread > 0) {
          var b = document.createElement('span');
          b.className = 'badge';
          b.textContent = svc.unread > 99 ? '99+' : String(svc.unread);
          btn.appendChild(b);
        }

        btn.addEventListener('click', function () {
          if (suppressClick) return;       // this click ended a drag
          window.shell.switchTo(svc.id);
        });
        btn.addEventListener('pointerdown', function (e) {
          if (e.button === 0) drag = { btn: btn, startX: e.clientX, moved: false };
        });
        // Keyboard reorder (WCAG 2.1.1): Alt+ArrowLeft / Alt+ArrowRight.
        btn.addEventListener('keydown', function (e) {
          if (!e.altKey) return;
          if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
          var tabs = Array.prototype.slice.call(servicesEl.querySelectorAll('.btn'));
          var i = tabs.indexOf(btn);
          var j = e.key === 'ArrowLeft' ? i - 1 : i + 1;
          if (j < 0 || j >= tabs.length) return; // already at the edge
          e.preventDefault();
          // Reorder the DOM, then derive the new id order from it.
          if (j < i) servicesEl.insertBefore(btn, tabs[j]);
          else servicesEl.insertBefore(btn, tabs[j].nextSibling);
          var newOrder = Array.prototype.slice.call(servicesEl.querySelectorAll('.btn'))
            .map(function (b) { return b.dataset.id; });
          focusAfterRender = btn.dataset.id; // re-focus this tab once state returns
          window.shell.reorder(newOrder);
        });
        servicesEl.appendChild(btn);
      });

      // Error overlay for the active service.
      var failed = !!(state && state.activeStatus === 'failed');
      if (failed) {
        errTitle.textContent = 'Couldn’t load ' + (state.activeName || 'this service');
        errDetail.textContent = (state.activeError ? state.activeError + '. ' : '') + 'Check your connection and try again.';
        overlay.classList.add('show');
        // Move focus to Retry only on the transition into the failed state,
        // not on every state push while already failed.
        if (!prevFailed) {
          var retry = document.getElementById('retry');
          if (retry) retry.focus();
        }
      } else {
        overlay.classList.remove('show');
      }
      prevFailed = failed;

      // Restore focus to a tab that was just reordered via the keyboard.
      if (focusAfterRender != null) {
        var toFocus = servicesEl.querySelector('.btn[data-id="' + focusAfterRender + '"]');
        focusAfterRender = null;
        if (toFocus) toFocus.focus();
      }
    }

    document.getElementById('add').addEventListener('click', function () { window.shell.addService(); });
    document.getElementById('settings').addEventListener('click', function () { window.shell.openSettings('appearance'); });
    document.getElementById('retry').addEventListener('click', function () { window.shell.reload(); });

    var brandLogo = document.getElementById('brand-logo');
    var brandVer = document.getElementById('brand-ver');
    window.shell.onBrand(function (info) {
      info = info || {};
      if (info.icon) { brandLogo.src = info.icon; brandLogo.classList.remove('hidden'); }
      else { brandLogo.classList.add('hidden'); }
      brandVer.textContent = info.version ? 'v' + String(info.version).replace(/^v/i, '') : '';
    });

    // --- Drag-to-reorder the service tabs ---
    function tabBefore(x) {
      var tabs = Array.prototype.slice.call(servicesEl.querySelectorAll('.btn:not(.dragging)'));
      for (var i = 0; i < tabs.length; i++) {
        var r = tabs[i].getBoundingClientRect();
        if (x < r.left + r.width / 2) return tabs[i];
      }
      return null;
    }
    document.addEventListener('pointermove', function (e) {
      if (!drag) return;
      if (!drag.moved) {
        if (Math.abs(e.clientX - drag.startX) < 5) return; // ignore tiny jitters
        drag.moved = true;
        drag.btn.classList.add('dragging');
      }
      var ref = tabBefore(e.clientX);
      if (ref == null) servicesEl.appendChild(drag.btn);
      else if (ref !== drag.btn) servicesEl.insertBefore(drag.btn, ref);
    });
    document.addEventListener('pointerup', function () {
      if (!drag) return;
      var d = drag; drag = null;
      if (d.moved) {
        d.btn.classList.remove('dragging');
        suppressClick = true;
        setTimeout(function () { suppressClick = false; }, 60);
        var order = Array.prototype.slice.call(servicesEl.querySelectorAll('.btn'))
          .map(function (b) { return b.dataset.id; });
        window.shell.reorder(order);
        // The reorder round-trips authoritative state from the main process, so
        // drop any state deferred mid-drag — rendering it would clobber the
        // user's manual arrangement with a stale snapshot.
        pendingState = null;
      } else if (pendingState) {
        var s = pendingState; pendingState = null; render(s);
      }
    });

    window.shell.onState(render);
    window.shell.ready();
  </script>
</body>
</html>
