name: Build installers

# Build KausApp for macOS, Windows, and Linux.
# - On every push to main / manual run: build all three and upload as artifacts.
# - On a version tag (v*): also attach the installers to a GitHub Release.

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to create/attach Releases on tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: sign every build with the SAME self-signed cert so in-place
      # auto-updates work (Squirrel.Mac needs a stable identity). Self-signed, so
      # Gatekeeper still shows "unidentified developer" on first install.
      - name: Build installer (macOS, signed)
        if: matrix.name == 'macOS'
        run: npm run dist -- --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # Windows/Linux: build unsigned. No CSC_* env at all (an empty CSC_LINK
      # makes electron-builder treat it as a bad cert path on Windows).
      - name: Build installer (Windows/Linux, unsigned)
        if: matrix.name != 'macOS'
        run: npm run dist -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kausapp-${{ matrix.name }}
          retention-days: 14
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
