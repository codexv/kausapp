name: Build installers

# Build KausApp for macOS, Windows, and Linux.
# - On every push to main / manual run: build all three and upload as artifacts.
# - On a version tag (v*): also attach the installers to a GitHub Release.

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to create/attach Releases on tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: import our consistent self-signed cert into a keychain so codesign
      # (run from afterPack) can sign every build with the SAME identity — that's
      # what lets macOS apply updates in place. electron-builder's own signing is
      # disabled (it rejects untrusted self-signed certs); afterPack does it.
      - name: Import macOS signing cert
        if: matrix.name == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain-db"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p actions "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p actions "$KC"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KC"
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v "$KC" || true

      - name: Build installer (macOS, signed)
        if: matrix.name == 'macOS'
        run: npm run dist -- --publish never
        env:
          # afterPack signs with this identity; disable electron-builder's own
          # signing (it won't use an untrusted self-signed cert).
          KAUSAPP_SIGN_IDENTITY: KausApp Self-Signed
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Windows/Linux: build unsigned. No CSC_* env at all (an empty CSC_LINK
      # makes electron-builder treat it as a bad cert path on Windows).
      - name: Build installer (Windows/Linux, unsigned)
        if: matrix.name != 'macOS'
        run: npm run dist -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kausapp-${{ matrix.name }}
          retention-days: 14
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
